<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Blog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Micro-Blogging Platform</h1>
            <p>A simple space to share your thoughts.</p>
        </header>

        <section class="create-post">
            <h2>Create a Post</h2>
            <form id="postForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="content">What's on your mind?</label>
                    <textarea id="content" rows="4" placeholder="Type your message here..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="imageUpload">Attach an Image (Optional)</label>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>
                <button type="submit" id="submitBtn">Post Message</button>
            </form>
        </section>

        <section class="posts-feed">
            <h2>Recent Posts</h2>
            <div id="postsList" class="posts-list">
                <!-- Posts will be generated here by JavaScript -->
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
